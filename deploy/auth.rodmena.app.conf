# auth.rodmena.app -> auth service (gunicorn on 127.0.0.1:4000, systemd unit `auth`).
# Reference copy lives in the repo at /home/farshid/develop/auth/deploy/.

upstream auth_backend {
    server 127.0.0.1:4000 fail_timeout=0;
}

# The REST API identifies callers by a UUID4 client key that is not checked
# against a stored secret: any well-formed UUID4 opens its own tenant namespace.
# Enforcing a limit in nginx makes it global across all gunicorn workers and
# caps how fast an anonymous caller can create namespaces or probe for keys.
# (limit_req_status is already set to 429 at http level by another vhost.)
limit_req_zone $binary_remote_addr zone=auth_api:10m rate=20r/s;

server {
    listen 443 ssl;
    server_name auth.rodmena.app;

    ssl_certificate /etc/letsencrypt/live/auth.rodmena.app/fullchain.pem;       # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/auth.rodmena.app/privkey.pem;     # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                            # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                              # managed by Certbot

    access_log /var/log/nginx/auth.rodmena.app.access.log;
    error_log /var/log/nginx/auth.rodmena.app.error.log;

    # Requests carry bearer keys; keep them off intermediaries and out of referrers.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # API payloads are small JSON documents.
    client_max_body_size 1m;

    gzip on;
    gzip_types application/json;
    gzip_min_length 512;

    location / {
        limit_req zone=auth_api burst=40 nodelay;

        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_redirect off;
    }

    # Liveness/readiness probes: unmetered and unlogged so monitoring does not
    # consume the rate-limit budget or drown the access log.
    location = /ping {
        proxy_pass http://auth_backend/ping;
        proxy_set_header Host $host;
        access_log off;
    }

    location = /health {
        proxy_pass http://auth_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }
}

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    server_name auth.rodmena.app;
    return 301 https://$host$request_uri;
}
