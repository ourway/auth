version: '3.8'

services:
  # Main auth service
  auth:
    build: .
    container_name: auth-server
    ports:
      - "4000:4000"
    environment:
      - AUTH_SQLITE_PATH=/data/auth.sqlite3
    volumes:
      - auth-data-volume:/data  # Persistent volume for the SQLite database
    restart: unless-stopped
    healthcheck:
      # the slim image has no curl; use python from the app itself
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/ping', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  auth-data-volume: